<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Table Booking - Tasty Bites</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <h1>Tasty Bites</h1>

    <nav>

        <a href="index.html">Home</a>

        <a href="about.html">About</a>

        <a href="services.html">Services</a>

        <a href="contact.html">Contact</a>

    </nav>

</header>

<section class="booking-page">

    <div class="booking-overlay">

        <div class="booking-form-box">

            <h2>Table Booking</h2>

            <p>Reserve your table for special moments</p>

            <form action="/booking" method="POST">

                <input 
                    type="text"
                    name="name"
                    placeholder="Enter Your Name"
                    required
                >

                <input 
                    type="date"
                    name="date"
                    required
                >

                <input 
                    type="number"
                    name="persons"
                    placeholder="Number of Persons"
                    required
                >

                <button type="submit">
                    Book Table
                </button>

            </form>

        </div>

    </div>

</section>

<footer>

    <p>© 2026 Tasty Bites Restaurant</p>

</footer>

</body>

</html>
