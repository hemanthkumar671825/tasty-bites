<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Home Delivery - Tasty Bites</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <h1>Tasty Bites</h1>

    <nav>

        <a href="index.html">Home</a>

        <a href="about.html">About</a>

        <a href="services.html">Services</a>

        <a href="contact.html">Contact</a>

    </nav>

</header>

<section class="delivery-page">

    <div class="delivery-overlay">

        <div class="delivery-form-box">

            <h2>Home Delivery</h2>

            <p>Fast and safe delivery to your doorstep</p>

            <form action="/delivery" method="POST">

                <input 
                    type="text"
                    name="name"
                    placeholder="Enter Your Name"
                    required
                >

                <input 
                    type="text"
                    name="phone"
                    placeholder="Phone Number"
                    required
                >

                <textarea
                    name="address"
                    rows="4"
                    placeholder="Enter Delivery Address"
                    required
                ></textarea>

                <button type="submit">
                    Submit Delivery
                </button>

            </form>

        </div>

    </div>

</section>

<footer>

    <p>© 2026 Tasty Bites Restaurant</p>

</footer>

</body>

</html>
